
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #08090c; color: #e4e8f0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { background: #12151c; border: 1px solid #252a36; border-radius: 20px; padding: 40px; text-align: center; max-width: 360px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .btn { display: flex; align-items: center; justify-content: center; gap: 12px; background: white; color: #333; font-weight: 600; padding: 14px 32px; border-radius: 12px; border: none; cursor: pointer; width: 100%; font-size: 15px; margin-top: 20px; transition: transform 0.2s; }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="card">
    <h2 class="text-xl font-bold mb-2">Project Nexus</h2>
    <p class="text-sm mb-6" style="color: #6b7588;">Inicia sesión para continuar</p>
    <button id="loginBtn" class="btn">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9.003 18c2.43 0 4.467-.806 5.956-2.18l-2.909-2.26c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.96v2.332C2.44 15.983 5.485 18 9.003 18z" fill="#34A853"/>
        <path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9.002c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.428 0 9.002 0 5.485 0 2.44 2.017.96 4.958L3.967 7.29c.708-2.127 2.692-3.71 5.036-3.71z" fill="#EA4335"/>
      </svg>
      Iniciar sesión con Google
    </button>
    <p id="error" class="text-red-500 text-xs mt-3 hidden">Error al iniciar sesión</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0qX8mZbJk90Qlgzq_kPQRJEU60BR4pDo",
      authDomain: "nexus-f0f5e.firebaseapp.com",
      databaseURL: "https://nexus-f0f5e-default-rtdb.firebaseio.com",
      projectId: "nexus-f0f5e",
      storageBucket: "nexus-f0f5e.firebasestorage.app",
      messagingSenderId: "937294267521",
      appId: "1:937294267521:web:e9db3a496f21c829ea7980"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // 1. Si ya está logueado, ir directo al dashboard
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'dashboard.html';
    });

    // 2. Botón de login
    document.getElementById('loginBtn').addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, provider);
        // El evento de arriba detectará el usuario y redirigirá
      } catch (e) {
        document.getElementById('error').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
